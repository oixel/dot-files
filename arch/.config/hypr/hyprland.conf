#
# Environment Variables
#

env = EDITOR, nvim
env = VISUAL, nvim

env = BEMOJI_PICKER_CMD, fuzzel -d  # Allows bemoji to work for emoji picking

#
# Programs
#

$mainMod = SUPER
$terminal = ghostty
$fileManager = ghostty -e yazi

# Custom boot terminal with little bird and poem
$asciiArt = arttime -a woodpecker --ac 3 -t "The may birds, though depart, always sing by June." --nolearn --tc 7 --hours 24


#
# Autostart
#

# Rune Noctalia status bar
exec-once = qs -c noctalia-shell

# Allows copying and pasting of text / images using cliphist (clipboard history manager) and wl-clipboard.
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

exec-once = xdg-mime default nvim.desktop text/plain  # Ensure nvim is used for plain text

# Automatically open music to special workspace (without switching to it)
exec-once = [workspace special:music silent; float; size 700 500] ghostty -e subtui

# Open Obsidian on its own workspace at start up (but don't switch to it)
exec-once = [workspace special:obsidian silent] obsidian  

# Display custom ascii art popup on start up
exec-once = [float; size 650 450; focus] ghostty -e $asciiArt

#
# General Setup
#

# Make it so a minimum of 3 workspaces are always open (even if empty)
workspace = 1, persistent:true
workspace = 2, persistent:true
workspace = 3, persistent:true

# Laptop multimedia keys for vocume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+  # Audio up
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-  # Audio down
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle  # Mute audio output
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle  # Mute audio input
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+  # Brightness up (have to hold FN key)
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-  # Brightness down (have to hold FN key)

misc {
	force_default_wallpaper = 0  # Get rid of anime girl wallpaper
	disable_hyprland_logo = true  # Get rid of hyprland logo wallpaper
	disable_splash_rendering = true  # Get rid of splash text
}

input {
	kb_layout = us

	touchpad {
		natural_scroll = true
		scroll_factor = 0.25
		tap-and-drag = false  # Avoid dragging by double-clicking
	}
}

#
# Gestures
#

workspace_swipe_distance = 200
gesture = 3, horizontal, workspace  # Change workspace with 4 fingers

#
# Session Keybinds
#

# Exit session (log out)
bind = $mainMod, ESCAPE, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# 
# App Shortcut Keybinds
#

bind = $mainMod, T, exec, $terminal
bind = $mainMod, Y, exec, $fileManager
#bind = $mainMod, O, exec, obsidian
bind = $mainMod, F, exec, firefox
bind = $mainMod SHIFT, F, exec, firefox --private-window  # Private firefox tab

# Take screenshot and open screenshot editor view
# Config for swappy editor is in .config/swappy
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | swappy -f -

# If obsidian exists somewhere, focus it, otherwise, open it in its own special workspace and make MOD + O works like workspace toggle.
workspace = special:obsidian, on-created-empty:[workspace special:obsidian silent] obsidian
bind = $mainMod, O, exec, bash -c '\
  focused=$(hyprctl activewindow | grep -c "obsidian"); \
  inspecial=$(hyprctl clients -j | python3 -c "import sys,json; clients=json.load(sys.stdin); print(any(c[\"workspace\"][\"name\"]==\"special:obsidian\" and \"obsidian\" in c[\"class\"] for c in clients))"); \
  obsidian_ws=$(hyprctl clients -j | python3 -c "import sys,json; clients=json.load(sys.stdin); matches=[c[\"workspace\"][\"name\"] for c in clients if \"obsidian\" in c[\"class\"]]; print(matches[0] if matches else \"\")"); \
  if [ "$focused" -gt 0 ] && [ "$inspecial" = "True" ]; then \
    hyprctl dispatch togglespecialworkspace obsidian; \
  elif [ "$focused" -gt 0 ] && [ "$inspecial" = "False" ] && [ -n "$obsidian_ws" ]; then \
    hyprctl dispatch movetoworkspacesilent special:obsidian,class:obsidian && \
    hyprctl dispatch togglespecialworkspace obsidian; \
  elif hyprctl clients | grep -q obsidian; then \
    hyprctl dispatch focuswindow class:obsidian; \
  else \
    hyprctl dispatch togglespecialworkspace obsidian; \
  fi'

bind = $mainMod, S, exec, ghostty -e yazi ~/documents/sticky  # Little shortcut to simple sticky notes (notepad alternative)

# Controls active media (mainly used for music player)
bind = $mainMod, P, exec, playerctl play-pause
bind = $mainMod SHIFT, N, exec, playerctl previous
bind = $mainMod, N, exec, playerctl next

#
# Fuzzel Keybinds
#

$openFuzzel = ~/code/scripts/fuzzel/open_fuzzel.sh

bind = $mainMod, SPACE, exec, $openFuzzel applications
bind = $mainMod, V, exec, $openFuzzel clipboard
bind = $mainMod, PERIOD, exec, $openFuzzel emojis
bind = $mainMod, SLASH, exec, $openFuzzel commands  # Toggles custom command menu (uses commands.json from fuzzel's config folder)

#
# Window Management Keybinds
#

bind = $mainMod, Q, killactive,  # Asks for permission before closing active window
bind = $mainMod SHIFT, Q, forcekillactive  # KILLS active window

bind = $mainMod, TAB, fullscreen, 1  # Full screen with status bar + gaps
bind = $mainMod SHIFT, TAB, fullscreen, 0  # True full screen
bind = $mainMod, GRAVE, togglefloating,

# Grouping functionality
#bind = $mainMod, G, togglegroup
#bind = $mainMode SHIFT, G, moveoutofgroup
#bind = $mainMod, Z, changegroupactive, b
#bind = $mainMod, X, changegroupactive, f

# Move focus with MOD + HJKL
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# ALT + TAB alternative
bind = ALT, TAB, cyclenext, prev
bind = ALT SHIFT, TAB, cyclenext

# Move window with MOD + SHIFT + HJKL
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Move / resize windows with MOD + LMB [+ SHIFT] (and dragging)
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod SHIFT, mouse:272, resizewindow

#
# Workspace Keybinds
#

# Switch workspaces with MOD + NUMBER
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Move to prev / next workspaces with [ / ]
bind = $mainMod, BRACKETLEFT, workspace, -1
bind = $mainMod, BRACKETRIGHT, workspace, +1

bind = $mainMod, EQUAL, workspace, empty  # Equivalent of going to right to empty workspace, creates new workspace if window is added to it (+ button)

# Move active window to specific workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Move active window to prev / next workspace while holding SHIFT and using [ / ]
bind = $mainMod SHIFT, BRACKETRIGHT, movetoworkspace, +1
bind = $mainMod SHIFT, BRACKETLEFT, movetoworkspace, -1

# If music player does not exist, create one in its own workspace when swapping to it.
workspace = special:music, on-created-empty:[workspace special silent; float; size 700 500] ghostty -e subtui

# Toggle special to music player and focus on it
bind = $mainMod, M, togglespecialworkspace, music

#
# --------------------------------------------------------------------------
#

#
# Appearance
#

# Ensure that terminal is always opaque (even when active)
windowrule = match:initial_title ^Ghostty$, opacity 0.90 0.85 override

# Ensures that Obsidian loads even if not focused
windowrule = match:initial_class obsidian, render_unfocused on

# Opens IMV (image viewer) in floating window
windowrule {
	name = "IMV floating view"
	match:initial_class = ^imv$
	float = true
	size = 800 500
}

# Make all animations happen instantly
animation = workspaces, 0, 0, default
animation = windows, 0, 0, default
animation = fade, 0, 0, default

general {
	gaps_in = 5
	gaps_out = 10

	border_size = 2

	col.active_border = rgb(F5C35A)  # My favorite yellow accent (from Obsidian theme!)
	col.inactive_border = rgba(00000000)  # Hidden border while inactive
}

decoration {
	rounding = 2
	rounding_power = 2

	# Change transparency based on focus state of window
	active_opacity = 1.0 
	inactive_opacity = 0.85

	# Tweak blur cause by low-opacity windows
	blur {
		enabled = true
		size = 1
		passes = 2
	}
}
